services:
  - type: web
    name: integrale-connect-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: integrale-connect-db
          property: connectionString

databases:
  - name: integrale-connect-db
    databaseName: integrale_connect
    user: integrale_connect
