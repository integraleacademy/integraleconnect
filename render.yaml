services:
  - type: web
    name: integrale-connect-crm
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: integrale-connect-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: SUPER_ADMIN_USERNAME
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SQLITE_PATH
        value: /data/integrale_connect.db
